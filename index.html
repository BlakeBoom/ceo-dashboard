<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boomerang BPO — Weekly Operations Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#f6f5f0;--card:#ffffff;--border:#e2e0d8;--border-light:#eeede6;
--text:#1a1a18;--text2:#6b6a65;--text3:#9c9a92;
--green-bg:#e4f0d4;--green-text:#2d5a0a;--green-border:#b8d89a;
--amber-bg:#fef0d5;--amber-text:#7a5600;--amber-border:#f5d88a;
--red-bg:#fde4e4;--red-text:#8b1a1a;--red-border:#f5aaaa;
--grey-bg:#f1efe8;--grey-text:#9c9a92;--grey-border:#d3d1c7;
--accent:#2c5aa0;--accent-light:#e8eff8;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.dash{max-width:1200px;margin:0 auto;padding:24px 20px 60px}
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header-left h1{font-size:20px;font-weight:600;letter-spacing:-0.3px;color:var(--text)}
.header-left p{font-size:13px;color:var(--text3);margin-top:2px}
.data-source-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:6px;margin-left:8px}
.data-source-badge.live{background:#e4f0d4;color:#2d5a0a}
.data-source-badge.static{background:#fef0d5;color:#7a5600}
.week-nav{display:flex;gap:4px;flex-wrap:wrap}
.wk-btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .15s}
.wk-btn:hover{border-color:var(--accent);color:var(--accent)}
.wk-btn.act{background:var(--accent);color:#fff;border-color:var(--accent)}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:28px}
.sum-card{background:var(--card);border:1px solid var(--border-light);border-radius:12px;padding:14px 16px}
.sum-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3)}
.sum-val{font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-top:2px;color:var(--text)}
.sum-sub{font-size:11px;color:var(--text3);margin-top:1px}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:6px}
.sec-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.camp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.camp-card{background:var(--card);border:1px solid var(--border-light);border-radius:14px;padding:16px 18px;transition:border-color .15s}
.camp-card:hover{border-color:var(--border)}
.camp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.camp-name{font-size:14px;font-weight:600;letter-spacing:-0.2px;color:var(--text)}
.camp-fte{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;background:var(--grey-bg);color:var(--text2)}
.camp-overall{width:8px;height:8px;border-radius:50%;margin-left:8px;flex-shrink:0}
.camp-overall.green{background:var(--green-text)}
.camp-overall.amber{background:var(--amber-text)}
.camp-overall.red{background:var(--red-text)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px}
.kpi{padding:8px 10px;border-radius:8px;border-left:3px solid transparent}
.kpi.green{background:var(--green-bg);border-left-color:var(--green-border)}
.kpi.amber{background:var(--amber-bg);border-left-color:var(--amber-border)}
.kpi.red{background:var(--red-bg);border-left-color:var(--red-border)}
.kpi.grey{background:var(--grey-bg);border-left-color:var(--grey-border)}
.kpi-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:3px}
.kpi.green .kpi-label{color:var(--green-text)}
.kpi.amber .kpi-label{color:var(--amber-text)}
.kpi.red .kpi-label{color:var(--red-text)}
.kpi.grey .kpi-label{color:var(--grey-text)}
.kpi-val{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.kpi.green .kpi-val{color:var(--green-text)}
.kpi.amber .kpi-val{color:var(--amber-text)}
.kpi.red .kpi-val{color:var(--red-text)}
.kpi.grey .kpi-val{color:var(--grey-text)}
.kpi-tgt{font-size:10px;font-weight:400;margin-top:1px;opacity:0.7}
.kpi.green .kpi-tgt{color:var(--green-text)}
.kpi.amber .kpi-tgt{color:var(--amber-text)}
.kpi.red .kpi-tgt{color:var(--red-text)}
.kpi.grey .kpi-tgt{color:var(--grey-text)}
.trend-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light)}
.trend-label{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap}
.spark{height:20px;flex:1;display:flex;align-items:end;gap:2px}
.spark-bar{flex:1;border-radius:2px 2px 0 0;min-width:4px;transition:height .3s}
.refresh-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .3s;z-index:100}
.refresh-bar.loading{transform:scaleX(0.7);transition:transform 2s}
.refresh-bar.done{transform:scaleX(1);transition:transform .2s}
.last-updated{font-size:11px;color:var(--text3);text-align:center;margin-top:32px;padding-top:16px;border-top:1px solid var(--border-light)}
.error-banner{background:#fde4e4;border:1px solid var(--red-border);border-radius:10px;padding:12px 18px;margin-bottom:16px;font-size:13px;color:var(--red-text);display:none}
.loading-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text3)}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border-light);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
.camp-grid{grid-template-columns:1fr}
.summary{grid-template-columns:repeat(2,1fr)}
.kpi-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

<div class="error-banner" id="errorBanner"></div>

// DATA FETCHING — Zoho Analytics API via Google Apps Script proxy
// ════════════════════════════════════════════════════════════════════════

let DASHBOARD_DATA = null;
let dataSource = 'static';

async function fetchLiveData() {
    // Step 1: Get access token from Google Apps Script proxy
    const tokenRes = await fetch(CONFIG.PROXY_URL, { method: 'GET', redirect: 'follow' });
    if (!tokenRes.ok) throw new Error(`Proxy error: ${tokenRes.status}`);
    const tokenData = await tokenRes.json();
    const accessToken = tokenData.access_token;
    if (!accessToken) throw new Error('No access token returned from proxy');

    // Step 2: Export data from qt_ceo_scorecard via Zoho Analytics API
    const exportUrl = `${CONFIG.ZOHO_API_BASE}/restapi/v2/workspaces/${encodeURIComponent(CONFIG.WORKSPACE)}/views/${encodeURIComponent(CONFIG.VIEW_NAME)}/data`;

    const zohoRes = await fetch(exportUrl, {
        method: 'GET',
        headers: {
            'Authorization': `Zoho-oauthtoken ${accessToken}`,
            'ZANALYTICS-ORGID': CONFIG.ORG_ID,
        }
    });

    if (!zohoRes.ok) {
        const errText = await zohoRes.text();
        throw new Error(`Zoho API error ${zohoRes.status}: ${errText}`);
    }

    const zohoData = await zohoRes.json();
    return transformZohoResponse(zohoData);
}

function transformZohoResponse(zohoData) {
    // Zoho Analytics API returns: { data: { columns: [...], rows: [[...], ...] } }
    // or for v2: { data: [ { col1: val1, col2: val2, ... }, ... ] }

    let rows;
    if (Array.isArray(zohoData.data)) {
        // V2 format: array of objects
        rows = zohoData.data;
    } else if (zohoData.data && zohoData.data.rows) {
        // Alternate format: columns + rows arrays
        const cols = zohoData.data.columns;
        rows = zohoData.data.rows.map(row => {
            const obj = {};
            cols.forEach((col, i) => { obj[col] = row[i]; });
            return obj;
        });
    } else {
        throw new Error('Unexpected Zoho API response format');
    }

    // Transform each row into dashboard format
    const allWeeks = new Set();
    const dataRows = [];

    rows.forEach(row => {
        const campaignKey = row.campaign_key;
        const week = row.week_label;
        allWeeks.add(week);

        const metrics = {};
        for (const [zohoCol, metricKey] of Object.entries(COL_MAP)) {
            if (['campaign_key','campaign_name','section','week_label','fte_count'].includes(zohoCol)) continue;
            const val = row[zohoCol];
            metrics[metricKey] = (val === null || val === '' || val === undefined) ? null : parseFloat(val);
        }

        dataRows.push({
            campaign_key: campaignKey,
            campaign_name: row.campaign_name,
            section: row.section,
            week: week,
            fte: parseInt(row.fte_count) || 0,
            metrics: metrics,
        });
    });

    // Sort weeks chronologically
    const weeks = [...allWeeks].sort((a, b) => {
        const [wa, ya] = a.match(/\d+/g).map(Number);
        const [wb, yb] = b.match(/\d+/g).map(Number);
        return ya - yb || wa - wb;
    });

    return {
        data: dataRows,
        targets: TARGETS,
        kpi_config: KPI_CONFIG,
        weeks: weeks,
    };
}

// DASHBOARD LOGIC
// ════════════════════════════════════════════════════════════════════════

const LOWER_BETTER = new Set(['aht','absence','abandon_rate','error_rate','res_time','acw','avg_resp_time','calls_abn']);

function rag(val, tgt, direction) {
    if (val == null || val === 0) return 'grey';
    if (tgt == null || direction === 'none') return 'grey';
    if (direction === 'lower' || LOWER_BETTER.has(direction)) {
        if (val <= tgt) return 'green';
        if (val <= tgt * 1.10) return 'amber';
        return 'red';
    }
    if (val >= tgt) return 'green';
    if (val >= tgt * 0.95) return 'amber';
    return 'red';
}

function fmtVal(val, kpi) {
    if (val == null) return '—';
    if (['calls','tickets','sales'].includes(kpi)) return Math.round(val).toLocaleString();
    if (['billable'].includes(kpi)) return Math.round(val).toLocaleString();
    if (['csat','qa','adherence','fcr','sla','talk_sla'].includes(kpi)) return val > 10 ? val.toFixed(1)+'%' : val.toFixed(2);
    if (['absence','abandon_rate','error_rate'].includes(kpi)) return val.toFixed(1)+'%';
    return val.toFixed(1);
}

function fmtTgt(tgt, kpi) {
    if (tgt == null) return '';
    if (['csat','qa','adherence','fcr','sla','talk_sla','absence','abandon_rate','error_rate','calls_abn','compliance','productivity'].includes(kpi)) return tgt+'%';
    return tgt;
}

function overallRag(metrics, targets, kpiConfig) {
    let hasRed = false, hasAmber = false;
    for (const [kpiKey, , direction] of kpiConfig) {
        if (direction === 'none') continue;
        const val = metrics[kpiKey];
        const tgt = targets[kpiKey];
        if (val == null || tgt == null) continue;
        const r = rag(val, tgt, direction);
        if (r === 'red') hasRed = true;
        if (r === 'amber') hasAmber = true;
    }
    if (hasRed) return 'red';
    if (hasAmber) return 'amber';
    return 'green';
}

function getSparkData(campaignKey, weeks, allData) {
    return weeks.map(w => {
        const row = allData.find(r => r.campaign_key === campaignKey && r.week === w);
        return row ? row.metrics.billable : 0;
    });
}

let selectedWeek = null;

function render() {
    const D = DASHBOARD_DATA;
    if (!D || !D.weeks || D.weeks.length === 0) {
        document.getElementById('app').innerHTML = '<div class="loading-overlay"><div>No data available</div></div>';
        return;
    }

    if (!selectedWeek || !D.weeks.includes(selectedWeek)) {
        selectedWeek = D.weeks[D.weeks.length - 2] || D.weeks[D.weeks.length - 1];
    }

    const weekData = D.data.filter(r => r.week === selectedWeek);
    const totalFTE = weekData.reduce((s, r) => s + r.fte, 0);
    const totalBillable = weekData.reduce((s, r) => s + (r.metrics.billable || 0), 0);
    const campaignCount = weekData.length;

    let greenCount = 0, amberCount = 0, redCount = 0;
    weekData.forEach(r => {
        const tgts = D.targets[r.campaign_key] || {};
        const config = D.kpi_config[r.campaign_key] || [];
        const o = overallRag(r.metrics, tgts, config);
        if (o === 'green') greenCount++;
        if (o === 'amber') amberCount++;
        if (o === 'red') redCount++;
    });

    const sections = {};
    weekData.forEach(r => {
        if (!sections[r.section]) sections[r.section] = [];
        sections[r.section].push(r);
    });

    let html = '';

    // Header
    const badge = dataSource === 'live'
        ? '<span class="data-source-badge live">● LIVE</span>'
        : '<span class="data-source-badge static">● OFFLINE</span>';
    html += `<div class="header">
        <div class="header-left">
            <h1>Operations weekly performance review ${badge}</h1>
            <p>Boomerang BPO · ${selectedWeek.replace(', ', ' · ')}</p>
        </div>
        <div class="week-nav">`;
    D.weeks.forEach(w => {
        const label = w.replace(', 2026', '');
        html += `<button class="wk-btn${w === selectedWeek ? ' act' : ''}" onclick="selectedWeek='${w}';render()">${label}</button>`;
    });
    html += `</div></div>`;

    // Summary
    html += `<div class="summary">
        <div class="sum-card"><div class="sum-label">Total FTE</div><div class="sum-val">${totalFTE}</div></div>
        <div class="sum-card"><div class="sum-label">Billable hours</div><div class="sum-val">${Math.round(totalBillable).toLocaleString()}</div></div>
        <div class="sum-card"><div class="sum-label">Campaigns</div><div class="sum-val">${campaignCount}</div></div>
        <div class="sum-card">
            <div class="sum-label">Health</div>
            <div class="sum-val" style="display:flex;align-items:center;gap:10px">
                <span style="color:var(--green-text)">${greenCount}</span>
                <span style="font-size:14px;color:var(--text3)">/</span>
                <span style="color:var(--amber-text)">${amberCount}</span>
                <span style="font-size:14px;color:var(--text3)">/</span>
                <span style="color:var(--red-text)">${redCount}</span>
            </div>
            <div class="sum-sub">green / amber / red</div>
        </div>
    </div>`;

    // Campaign cards
    for (const [sec, camps] of Object.entries(sections)) {
        html += `<div class="sec-title"><span class="sec-dot"></span>${sec}</div>`;
        html += `<div class="camp-grid">`;
        camps.sort((a, b) => a.campaign_name.localeCompare(b.campaign_name));

        camps.forEach(r => {
            const tgts = D.targets[r.campaign_key] || {};
            const config = D.kpi_config[r.campaign_key] || [];
            const overall = overallRag(r.metrics, tgts, config);
            const sparkVals = getSparkData(r.campaign_key, D.weeks, D.data);
            const sparkMax = Math.max(...sparkVals, 1);

            html += `<div class="camp-card">`;
            html += `<div class="camp-head">
                <div style="display:flex;align-items:center;gap:8px">
                    <span class="camp-overall ${overall}"></span>
                    <span class="camp-name">${r.campaign_name}</span>
                </div>
                <span class="camp-fte">${r.fte} FTE</span>
            </div>`;

            html += `<div class="kpi-grid">`;
            config.forEach(([kpiKey, kpiLabel, direction]) => {
                const val = r.metrics[kpiKey];
                const tgt = tgts[kpiKey];
                const ragStatus = (direction === 'none') ? 'grey' : rag(val, tgt, direction);
                html += `<div class="kpi ${ragStatus}">
                    <div class="kpi-label">${kpiLabel}</div>
                    <div class="kpi-val">${fmtVal(val, kpiKey)}</div>
                    ${tgt != null ? `<div class="kpi-tgt">tgt ${fmtTgt(tgt, kpiKey)}</div>` : ''}
                </div>`;
            });
            html += `</div>`;

            // Sparkline
            html += `<div class="trend-row">
                <span class="trend-label">Billable trend</span>
                <div class="spark">`;
            sparkVals.forEach((v, i) => {
                const h = Math.max(2, (v / sparkMax) * 20);
                const isSelected = D.weeks[i] === selectedWeek;
                const color = isSelected ? 'var(--accent)' : 'var(--border)';
                html += `<div class="spark-bar" style="height:${Math.round(h)}px;background:${color}"></div>`;
            });
            html += `</div></div>`;
            html += `</div>`;
        });
        html += `</div>`;
    }

    // Footer
    const now = new Date();
    html += `<div class="last-updated">
        Last rendered: ${now.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})} ${now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
        · Data: ${dataSource === 'live' ? 'Zoho Analytics API (live)' : 'Embedded snapshot (offline)'}
        · Source: qt_ceo_scorecard
    </div>`;

    document.getElementById('app').innerHTML = html;
}


// ════════════════════════════════════════════════════════════════════════
// INITIALIZATION — try live data first, fall back to embedded snapshot
// ════════════════════════════════════════════════════════════════════════

async function init() {
    const bar = document.getElementById('refreshBar');
    const errEl = document.getElementById('errorBanner');

    // Try live data
    if (CONFIG.ORG_ID !== 'YOUR_ORG_ID_HERE') {
        bar.classList.add('loading');
        try {
            DASHBOARD_DATA = await fetchLiveData();
            dataSource = 'live';
            errEl.style.display = 'none';
            bar.classList.remove('loading');
            bar.classList.add('done');
            setTimeout(() => bar.classList.remove('done'), 500);
            render();

            // Set up auto-refresh
            setInterval(async () => {
                bar.classList.add('loading');
                try {
                    DASHBOARD_DATA = await fetchLiveData();
                    dataSource = 'live';
                    render();
                } catch (e) {
                    console.warn('Auto-refresh failed, keeping last data:', e);
                }
                bar.classList.remove('loading');
                bar.classList.add('done');
                setTimeout(() => bar.classList.remove('done'), 500);
            }, CONFIG.REFRESH_INTERVAL_MS);

            return;
        } catch (e) {
            console.error('Live data fetch failed:', e);
            errEl.textContent = `⚠ Live data unavailable (${e.message}). Showing offline snapshot.`;
            errEl.style.display = 'block';
            bar.classList.remove('loading');
        }
    } else {
        errEl.textContent = '⚠ ORG_ID not configured — showing offline snapshot. Set CONFIG.ORG_ID in the HTML to enable live data.';
        errEl.style.display = 'block';
    }

    // Fallback to embedded data
    DASHBOARD_DATA = FALLBACK_DATA;
    dataSource = 'static';
    render();
}

init();
</script>

</html>
